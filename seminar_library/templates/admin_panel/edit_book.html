{% extends 'base.html' %}
{% block title %}Edit Book{% endblock %}
{% block content %}
<div class="page-header"><h1>Edit Book</h1></div>
<div class="card" style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" value="{{ book.title }}" required>
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" name="author" value="{{ book.author }}" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input type="text" name="category" value="{{ book.category }}" required>
    </div>
    <div class="form-group">
      <label>Total Quantity</label>
      <input type="number" name="quantity" value="{{ book.total_quantity }}" min="1" required>
    </div>
    <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'librarian_books' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
