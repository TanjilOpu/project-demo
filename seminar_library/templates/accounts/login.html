{% extends 'base.html' %}
{% block title %}Login — MBSTU Seminar Library{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
  <div class="page-header" style="text-align:center;">
    <h1>Welcome Back</h1>
    <p>Sign in with your institutional email</p>
  </div>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="yourID@mbstu.ac.bd" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:0.7rem;">Login</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--ink-light);">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--gold); font-weight:600;">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
